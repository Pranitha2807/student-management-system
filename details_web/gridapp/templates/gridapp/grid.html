<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Grid - 3 Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">3 Columns Only</h2>

    <div class="row">
        <div class="col-md-4 bg-primary text-white p-3 text-center">
            Column 1
        </div>
        <div class="col-md-4 bg-success text-white p-3 text-center">
            Column 2
        </div>
        <div class="col-md-4 bg-danger text-white p-3 text-center">
            Column 3
        </div>
    </div>

</div>

</body>
</html>
