<!DOCTYPE html>
<html>
<head>
    <title>Email Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Send Email</h2>

    <div class="row">
        <div class="col-md-6 offset-md-3">

            <form method="POST">
                {% csrf_token %}

                <input type="text" name="name" class="form-control mb-3" placeholder="Enter Name">
                <input type="email" name="email" class="form-control mb-3" placeholder="Enter Email">
                <textarea name="message" class="form-control mb-3" placeholder="Enter Message"></textarea>

                <button type="submit" class="btn btn-primary w-100">Send Email</button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
