<!DOCTYPE html>
<html>
<head>
    <title>Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Bootstrap Carousel</h2>

    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
        
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://picsum.photos/800/300?1" class="d-block w-100">
            </div>

            <div class="carousel-item">
                <img src="https://picsum.photos/800/300?2" class="d-block w-100">
            </div>

            <div class="carousel-item">
                <img src="https://picsum.photos/800/300?3" class="d-block w-100">
            </div>
        </div>

        <!-- Buttons -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
